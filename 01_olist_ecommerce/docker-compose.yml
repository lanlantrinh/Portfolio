services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: olist
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/workspace/data:ro
      - ./sql:/workspace/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist -d olist"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
